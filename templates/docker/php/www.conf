; PHP-FPM pool configuration
; Tuned for a single-app VPS with ~2–4 GB RAM.
; Adjust pm.max_children based on available memory: ~30 MB per worker is typical.

[www]
user = www-data
group = www-data

; Listen on TCP so nginx can connect by host/port
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

; Dynamic process management
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Logging — send slow requests to stderr (visible in docker logs)
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s

; Status page for healthcheck (used by php-fpm-healthcheck if needed)
pm.status_path = /status

; Pass environment variables through to PHP workers
; Without this, getenv() returns empty strings in PHP-FPM
clear_env = no
