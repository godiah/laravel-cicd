# Production Docker Compose — {{APP_LABEL}}
# All secrets come from .env on the server (never committed to git).
#
# Usage:
#   docker compose -f docker-compose.prod.yaml --env-file .image-tag.env up -d
#
# The .image-tag.env file is written by the CD pipeline on every deploy:
#   APP_IMAGE_TAG=sha-<short>
# When absent (e.g. manual first boot), services fall back to :latest.

# Shared volumes mounted into every app-layer container (app, horizon, scheduler).
# Named volumes persist data across image upgrades and container restarts.
x-app-volumes: &app-volumes
  - 'storage:/var/www/html/storage'
  - 'cache:/var/www/html/bootstrap/cache'

services:

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy + static asset server (loopback only)
  # Binds to 127.0.0.1 so the host-level reverse proxy (nginx/Caddy) is the
  # only entry point; it handles TLS termination and forwards here over HTTP.
  # ---------------------------------------------------------------------------
  nginx:
    image: ghcr.io/{{GITHUB_REPO_OWNER}}/{{APP_NAME_SLUG}}:nginx-${APP_IMAGE_TAG:-latest}
    ports:
      # Loopback-only — host nginx/Caddy handles TLS and proxies here.
      # Change the host port if another app already uses {{PROD_PORT}} on this server.
      - '127.0.0.1:{{PROD_PORT}}:80'
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------------------------------------------------------------------
  # app — PHP-FPM (port 9000, internal only)
  # ---------------------------------------------------------------------------
  app:
    image: ghcr.io/{{GITHUB_REPO_OWNER}}/{{APP_NAME_SLUG}}:${APP_IMAGE_TAG:-latest}
    expose:
      - '9000'
    env_file: .env
    volumes: *app-volumes
    depends_on:
      {{DB_SERVICE_NAME}}:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'sh', '-c', 'nc -z localhost 9000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------------------------------------------------------------------
  # horizon — queue worker (shares app image, no HTTP port)
  # [HORIZON_SERVICE_BLOCK]: Include only if laravel/horizon is in composer.json
  # ---------------------------------------------------------------------------
  horizon:
    image: ghcr.io/{{GITHUB_REPO_OWNER}}/{{APP_NAME_SLUG}}:${APP_IMAGE_TAG:-latest}
    command: php artisan horizon
    env_file: .env
    volumes: *app-volumes
    stop_grace_period: 30s
    depends_on:
      app:
        condition: service_healthy
      {{DB_SERVICE_NAME}}:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      disable: true  # queue worker — no HTTP port
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------------------------------------------------------------------
  # scheduler — Laravel cron via schedule:work (shares app image)
  # ---------------------------------------------------------------------------
  scheduler:
    image: ghcr.io/{{GITHUB_REPO_OWNER}}/{{APP_NAME_SLUG}}:${APP_IMAGE_TAG:-latest}
    command: php artisan schedule:work
    env_file: .env
    volumes: *app-volumes
    depends_on:
      app:
        condition: service_healthy
      {{DB_SERVICE_NAME}}:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------------------------------------------------------------------
  # DATABASE SERVICE BLOCK
  # ---------------------------------------------------------------------------

  # MySQL variant:
  mysql:
    image: mysql:8.4
    ports:
      # Loopback only — connect remotely via SSH tunnel if needed.
      # Port 3307 avoids conflict with any native mysqld on the host.
      - '127.0.0.1:3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'mysql_data:/var/lib/mysql'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # PostgreSQL variant (replace mysql service above):
  # postgres:
  #   image: postgres:16.3-alpine
  #   ports:
  #     - '127.0.0.1:5433:5432'
  #   env_file: .env    # reads POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
  #   volumes:
  #     - 'postgres_data:/var/lib/postgresql/data'
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 15s
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: '10m'
  #       max-file: '3'

  # ---------------------------------------------------------------------------
  # redis — cache, session, queue backend (internal only)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    # AOF persistence + RDB snapshots — survives container restarts
    command: redis-server --appendonly yes --save "900 1" --save "300 10"
    volumes:
      - 'redis_data:/data'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

# Explicit network name prevents container name collisions when multiple
# compose projects run on the same Docker host.
networks:
  default:
    name: {{APP_NAME_SLUG}}-prod

volumes:
  storage:
  cache:
  mysql_data:
  # postgres_data:   # use this instead of mysql_data for PostgreSQL
  redis_data:
