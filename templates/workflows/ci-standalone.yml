name: CI

on:
  push:
    branches: [develop, 'feature/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------
  # 1. Code style — fast, no services
  # -------------------------------------------------------
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "{{PHP_VERSION}}"
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked
          composer-options: --no-scripts

      - run: composer lint

  # -------------------------------------------------------
  # 2. Security audit — fast, no services
  # -------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "{{PHP_VERSION}}"
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked
          composer-options: --no-scripts

      - run: composer audit

  # -------------------------------------------------------
  # [PHPSTAN_JOB_BLOCK]
  # Include this job only if larastan/larastan is in composer.json:
  #
  # analyse:
  #   name: Static Analysis (PHPStan)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
