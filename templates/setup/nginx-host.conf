# Host nginx config for {{PROD_DOMAIN}}
# This file lives on the VPS at /etc/nginx/sites-available/{{PROD_DOMAIN}}
# It proxies HTTPS traffic to the dockerized nginx container on port {{PROD_PORT}}.
# Certbot will add the ssl_certificate directives after you run server-setup.sh.

server {
    listen 80;
    listen [::]:80;
    server_name {{PROD_DOMAIN}};

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name {{PROD_DOMAIN}};

    # SSL — managed by Certbot (lines below added automatically after certbot run)
    # ssl_certificate /etc/letsencrypt/live/{{PROD_DOMAIN}}/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/{{PROD_DOMAIN}}/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Proxy to the Docker nginx container
    location / {
        proxy_pass http://127.0.0.1:{{PROD_PORT}};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (needed for Reverb/Soketi/Pusher)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # Buffer size for large responses
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # Logging
    access_log /var/log/nginx/{{PROD_DOMAIN}}.access.log;
    error_log /var/log/nginx/{{PROD_DOMAIN}}.error.log;
}
