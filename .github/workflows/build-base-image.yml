name: Build PHP Base Images

# Builds and pushes the shared PHP base images to GHCR.
# Triggers on any change to base-image/ OR manually with a PHP version override.
# Images are tagged as: ghcr.io/godiah/php-base:X.Y-fpm-alpine
#
# After publishing, set the package visibility to Public under:
#   GitHub → godiah → Packages → php-base → Package Settings → Change visibility → Public
# This allows project Dockerfiles to pull the base image without extra authentication.

on:
  push:
    branches: [main]
    paths:
      - 'base-image/**'
  workflow_dispatch:
    inputs:
      php-versions:
        description: 'Comma-separated PHP versions to build (e.g. 8.3,8.4)'
        required: false
        default: '8.3,8.4'

jobs:
  build:
    name: Build PHP ${{ matrix.php-version }} base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP ${{ matrix.php-version }} base image
        uses: docker/build-push-action@v6
        with:
          context: ./base-image
          file: ./base-image/Dockerfile
          push: true
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
          tags: |
            ghcr.io/godiah/php-base:${{ matrix.php-version }}-fpm-alpine
            ghcr.io/godiah/php-base:${{ matrix.php-version }}-fpm-alpine-latest
          cache-from: type=gha,scope=php-base-${{ matrix.php-version }}
          cache-to: type=gha,mode=max,scope=php-base-${{ matrix.php-version }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
