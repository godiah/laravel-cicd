name: Laravel CI (reusable)

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version (e.g. 8.4)'
        type: string
        default: '8.4'
      db-type:
        description: 'Database type: mysql or pgsql'
        type: string
        default: 'mysql'
      has-vite:
        description: 'Whether the project has Vite frontend assets'
        type: boolean
        default: false
      has-phpstan:
        description: 'Whether to run PHPStan / Larastan static analysis'
        type: boolean
        default: false
      has-tenancy:
        description: 'Whether to run tenants:migrate (Stancl Tenancy)'
        type: boolean
        default: false
      app-name-slug:
        description: 'Hyphenated app name used for the build-check image tag'
        type: string
        required: true
    secrets:
      GH_PAT:
        required: true

jobs:
  # -------------------------------------------------------
  # 1. Code style — fast, no services
  # -------------------------------------------------------
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com "${{ secrets.GH_PAT }}"

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked
          composer-options: --no-scripts

      - run: composer lint

  # -------------------------------------------------------
  # 2. Security audit — fast, no services
  # -------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com "${{ secrets.GH_PAT }}"

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked
          composer-options: --no-scripts

      - run: composer audit

  # -------------------------------------------------------
  # 3. Static analysis — only if has-phpstan is true
  # -------------------------------------------------------
  analyse:
    name: Static Analysis (PHPStan)
    if: inputs.has-phpstan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none
          extensions: pdo_mysql, pdo_pgsql, redis, bcmath, intl, zip, pcntl

      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com "${{ secrets.GH_PAT }}"

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked
          composer-options: --no-scripts

      - name: Bootstrap Laravel for analysis
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=array/' .env
          php artisan key:generate
          php artisan package:discover --ansi

      - name: Cache PHPStan results
        uses: actions/cache@v4
        with:
          path: /tmp/phpstan
          key: phpstan-${{ hashFiles('composer.lock', 'phpstan.neon', 'phpstan-baseline.neon') }}
          restore-keys: phpstan-

      - run: composer analyse

  # -------------------------------------------------------
  # 4a. Test suite — MySQL variant
  # -------------------------------------------------------
  test-mysql:
    name: Tests (MySQL)
    if: inputs.db-type == 'mysql'
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    env:
      DB_HOST: 127.0.0.1
      DB_PASSWORD: password
      REDIS_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pdo_mysql, redis, bcmath, intl, zip, gd, pcntl, mbstring, xml, opcache
          coverage: none

      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com "${{ secrets.GH_PAT }}"

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked

      - name: Set up Node.js
        if: inputs.has-vite
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        if: inputs.has-vite
        run: npm ci

      - name: Build frontend assets
        if: inputs.has-vite
        run: npm run build

      - name: Configure environment
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=testing/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          sed -i 's/^REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
          sed -i 's/^REDIS_PORT=.*/REDIS_PORT=6379/' .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: Validate tenant migrations
        if: inputs.has-tenancy
        run: php artisan tenants:migrate --force

      - name: Run tests
        run: composer test

  # -------------------------------------------------------
  # 4b. Test suite — PostgreSQL variant
  # -------------------------------------------------------
  test-pgsql:
    name: Tests (PostgreSQL)
    if: inputs.db-type == 'pgsql'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.3-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pdo_pgsql, pgsql, redis, bcmath, intl, zip, gd, pcntl, mbstring, xml, opcache
          coverage: none

      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com "${{ secrets.GH_PAT }}"

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked

      - name: Set up Node.js
        if: inputs.has-vite
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        if: inputs.has-vite
        run: npm ci

      - name: Build frontend assets
        if: inputs.has-vite
        run: npm run build

      - name: Configure environment
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=testing/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=postgres/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=/' .env
          sed -i 's/^REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
          sed -i 's/^REDIS_PORT=.*/REDIS_PORT=6379/' .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: postgres
          DB_PASSWORD: ''

      - name: Run tests
        run: composer test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: postgres
          DB_PASSWORD: ''
          REDIS_HOST: 127.0.0.1

  # -------------------------------------------------------
  # 5. Production build check
  #    Runs in parallel with tests — catches Dockerfile failures
  #    before main is touched. Primes the GHA cache for CD.
  # -------------------------------------------------------
  build-check:
    name: Production Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          target: production
          push: false
          load: true
          tags: ${{ inputs.app-name-slug }}-build-check:ci
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
          secrets: |
            github_token=${{ secrets.GH_PAT }}

      - name: Verify artisan cache commands run inside the image
        run: |
          APP_KEY=$(docker run --rm ${{ inputs.app-name-slug }}-build-check:ci \
            php -r "echo 'base64:'.base64_encode(random_bytes(32));")

          docker run --rm \
            -e APP_KEY="$APP_KEY" \
            -e APP_ENV=production \
            -e APP_DEBUG=false \
            -e DB_CONNECTION=${{ inputs.db-type == 'mysql' && 'mysql' || 'pgsql' }} \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=${{ inputs.db-type == 'mysql' && '3306' || '5432' }} \
            -e DB_DATABASE=${{ inputs.app-name-slug }} \
            -e DB_USERNAME=${{ inputs.db-type == 'mysql' && 'root' || 'postgres' }} \
            -e DB_PASSWORD=secret \
            -e REDIS_HOST=127.0.0.1 \
            -e CACHE_STORE=redis \
            -e SESSION_DRIVER=redis \
            -e QUEUE_CONNECTION=redis \
            ${{ inputs.app-name-slug }}-build-check:ci \
            sh -c "
              php artisan config:cache &&
              php artisan route:cache &&
              php artisan view:cache &&
              php artisan event:cache
            "

  # -------------------------------------------------------
  # 6. Auto-merge to main after all gates pass.
  #    test-mysql and test-pgsql are conditional — whichever
  #    is skipped counts as success for the purposes of needs.
  # -------------------------------------------------------
  auto-merge:
    name: Auto-merge to main
    needs: [lint, audit, analyse, test-mysql, test-pgsql, build-check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/'))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Merge into main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge --no-ff origin/${{ github.ref_name }} \
            -m "chore: auto-merge ${{ github.ref_name }} into main after CI passed"
          git push origin main
